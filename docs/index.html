<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SeedSigner Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Official documentation for SeedSigner — an open-source, air-gapped Bitcoin signing device.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#f6851b">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <style>
    :root {
      --theme-color: #f6851b;
      --sidebar-nav-link-color--active: #f6851b;
      --sidebar-nav-link-border-color--active: #f6851b;
      --sidebar-name-color: #f6851b;
      --link-color: #f6851b;
      --link-color--hover: #d4710f;
      --blockquote-border-color: #f6851b;
      --notice-tip-border-color: #f6851b;
    }
    .sidebar .app-name {
      text-align: center;
      padding: 20px 0 10px;
    }
    .sidebar .app-name img {
      max-width: 160px;
    }
    .markdown-section h1 {
      border-bottom: 2px solid #f6851b;
      padding-bottom: 0.3em;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .warning-box {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
    }
    .danger-box {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
    }
    .tip-box {
      background: #d4edda;
      border-left: 4px solid #28a745;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="images/SeedSigner_Logo.png" alt="SeedSigner" />',
      nameLink: '/',
      //repo: 'https://github.com/SeedSigner/seedsigner',
      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found.',
        paths: 'auto',
        depth: 3
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      themeColor: '#f6851b',
      notFoundPage: true,
      sidebarDisplayLevel: 1,  // Only show top-level by defaul
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress-bar@1/dist/plugin.min.js"></script>
</body>
</html>
